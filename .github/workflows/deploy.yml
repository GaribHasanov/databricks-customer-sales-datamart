name: Databricks CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo code götür
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Databricks CLI install
      - name: Install Databricks CLI
        run: pip install databricks-cli

      # 4. Environment variables set et
      - name: Set Databricks Credentials
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV

      # 5. Connection test
      - name: Test Databricks Connection
        run: databricks clusters list
