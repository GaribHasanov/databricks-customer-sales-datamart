bundle:
  name: databricks-customer-sales-datamart

include:
  - config/*.yml

targets:
  prod:
    workspace:
      host: "https://databricks.com"
      root_path: /Shared/deployments/hasanov_garib/datamart_prod
    mode: production

resources:
  jobs:
    bronze_customer_job:
      name: "[prod] bronze_customer_job"
      tasks:
        - task_key: load_customer_bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_customer_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema_bronze}
              customer_volume_path: ${var.customer_volume}
          # 'new_cluster' əvəzinə serverless compute istifadə edirik
          compute_key: "serverless_compute"

      # Serverless hesablama resursunu burada təyin edirik
      compute:
        - compute_key: "serverless_compute"
          spec:
            kind: "serverless"
