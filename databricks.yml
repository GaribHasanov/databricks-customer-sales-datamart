bundle:
  name: databricks-customer-sales-datamart

include:
  - config/*.yml

variables:
  catalog:
    default: "dev"
  schema_bronze:
    default: "bronze"
  customer_volume:
    default: "/Volumes/dev/00_landing_zone/01_managed_volume"

targets:
  prod:
    workspace:
      host: "https://dbc-ac974108-f7a7.cloud.databricks.com"
      root_path: /Workspace/Repos/Production/core_data_v1/customer/bronze
    mode: production

resources:
  # --- YENİ: Metadata üçün Volume yaradılması ---
  volumes:
    metadata_volume:
      name: metadata
      catalog_name: ${var.catalog}
      schema_name: ${var.schema_bronze}

  jobs:
    bronze_customer_job:
      name: "[prod] bronze_customer_job"
      
      schedule:
        quartz_cron_expression: "0 0 1 * * ?" 
        timezone_id: "UTC"
        pause_status: "UNPAUSED"
      
      tasks:
        - task_key: load_customer_bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_customer_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema_bronze}
              customer_volume_path: ${var.customer_volume}
         
              checkpoint_path: "/Volumes/${var.catalog}/${var.schema_bronze}/metadata/checkpoints/customer_bronze"
              schema_location: "/Volumes/${var.catalog}/${var.schema_bronze}/metadata/schemas/customer_bronze"
          
          compute_key: "serverless_compute"

      compute:
        - compute_key: "serverless_compute"
          spec:
            kind: "serverless"