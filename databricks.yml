bundle:
  name: databricks-customer-sales-datamart

include:
  - config/*.yml

targets:
  dev:
    workspace:
      host: "https://databricks.com"
    default: true

  prod:
    workspace:
      host: "https://databricks.com"
    # Professional email-siz yol
    root_path: /Shared/deployments/${bundle.name}/${bundle.target}
    # Community Edition-da icazə xətasını (deploy.lock) keçmək üçün:
    mode: development 

resources:
  jobs:
    bronze_customer_job:
      name: "[${bundle.target}] bronze_customer_job"
      tasks:
        - task_key: load_customer_bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_customer_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema_bronze}
              customer_volume_path: ${var.customer_volume}
          new_cluster:
            num_workers: 1
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
