bundle:
  name: databricks-customer-sales-datamart

targets:
  prod:
    workspace:
      host: "https://dbc-ac974108-f7a7.cloud.databricks.com"
      # Shared qovluğundan istifadə edirik ki, 'Users' məhdudiyyətinə düşməyək
      root_path: /Shared/deployments/hasanov_garib/datamart_prod
    mode: development # Əvvəlcə development modunda yoxla

resources:
  jobs:
    bronze_customer_job:
      name: "[prod] bronze_customer_job"
      tasks:
        - task_key: load_customer_bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_customer_ingestion.py
          new_cluster:
            num_workers: 1
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
