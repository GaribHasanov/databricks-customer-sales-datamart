bundle:
  name: databricks-customer-sales-datamart

targets:
  prod:
    workspace:
      host: "https://dbc-ac974108-f7a7.cloud.databricks.com"
      root_path: /Shared/deployments/datamart_prod
    mode: development

resources:
  jobs:
    bronze_customer_job:
      name: "[prod] bronze_customer_job"
      tasks:
        - task_key: load_customer_bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_customer_ingestion.py
          # 'new_cluster' blokunu sildik, bunun əvəzinə serverless istifadə edirik
          job_cluster_key: "serverless_cluster"

      job_clusters:
        - job_cluster_key: "serverless_cluster"
          new_cluster:
            # Serverless mühitində spark_version və node_type tələb olunmur
            spark_version: "13.3.x-scala2.12"
            custom_tags:
              ResourceClass: "Serverless"
