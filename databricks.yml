bundle:
  name: databricks-customer-sales-datamart

include:
  - config/*.yml

targets:
  dev:
    workspace:
      host: "https://dbc-ac974108-f7a7.cloud.databricks.com"
    default: true

  prod:
    workspace:
      host: "https://dbc-ac974108-f7a7.cloud.databricks.com"
    # İcazəni hədəf səviyyəsində təyin edirik
    permissions:
      - user_name: hasanov.garib@gmail.com
        level: CAN_MANAGE
    mode: development 

resources:
  jobs:
    bronze_customer_job:
      name: "[${bundle.target}] bronze_customer_job"
      # İcazəni resurs səviyyəsində də təkrarlayırıq (double-check)
      permissions:
        - user_name: hasanov.garib@gmail.com
          level: CAN_MANAGE
      tasks:
        - task_key: load_customer_bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_customer_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema_bronze}
              customer_volume_path: ${var.customer_volume}
          new_cluster:
            num_workers: 1
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
