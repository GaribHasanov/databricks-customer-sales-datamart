env: dev

storage:
  landing_zone: "/Volumes/dev/00_landing_zone"
  datasets:
    customers:
      path: "/Volumes/dev/00_landing_zone/01_managed_volume/customers"
      format: csv
    sales:
      path: "/Volumes/dev/00_landing_zone/02_managed_volume/sales"
      format: csv

tables:
  catalog: dev_catalog   # Catalog adını bura yaz
  schema: bronze_schema # Schema adını bura yaz
  bronze:
    customers: customers_table
    sales: sales_table

options:
  header: true
  inferSchema: true
