env: dev

storage:
  base_path: "/Volumes/dev/00_landing_zone"

  datasets:
    customers:
      path: "01_managed_volume/customers"
      format: csv

    sales:
      path: "02_managed_volume/sales"
      format: csv

tables:
  bronze:
    customers: dev_bronze_customers
    sales: dev_bronze_sales

  silver:
    customers: dev_silver_customers
    sales: dev_silver_sales

  gold:
    customer_mart: dev_gold_customer_mart

options:
  header: true
  inferSchema: true
