env: dev

storage:
  datasets:
    customers:
      # Volume daxilindəki bütün CSV fayllarını oxumaq üçün
      path: "/Volumes/dev/00_landing_zone/01_managed_volume/*.csv"
      format: csv
    sales:
      path: "/Volumes/dev/00_landing_zone/02_managed_volume/*.csv"
      format: csv

tables:
  catalog: "dev"
  schema: "01_bronze" 
  bronze:
    customers: "dev_bronze_customers"
    sales: "dev_bronze_sales"

options:
  header: true
  inferSchema: true
